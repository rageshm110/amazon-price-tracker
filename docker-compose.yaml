# docker-compose.yml
services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8085:80"
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MONGO_URI=mongodb://db:27017/amazonPriceTracker
      - PORT=5000
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    # Simplified raw TCP bash handshake to bypass missing shell packages
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/127.0.0.1/27017'"]
      interval: 3s
      timeout: 3s
      retries: 5

volumes:
  mongo-data: